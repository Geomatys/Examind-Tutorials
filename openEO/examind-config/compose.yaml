services :
  exa-db:
    image: postgis/postgis:17-3.5-alpine
    restart: "no"
    volumes:
      - exa-db-volume:/var/lib/postgresql/data/
      - "./mount/exa-db/:/usr/local/exa-db/:Z"
    ports:
      - "5440:5432"
    environment:
      POSTGRES_DB: examind
      POSTGRES_USER: examind
      POSTGRES_PASSWORD: examind
      PGDATA: /var/lib/postgresql/data/pgdata/
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "examind", "-d", "examind" ]
      retries: 10
      interval: "2s"

  examind:
    image: images.geomatys.com/examind/examind-community:gaia-data
    restart: "no"
    volumes:
     - "./mount/examind/data/:/var/examind/:z"
     - "./mount/examind/files/:/var/files/:ro,z"
    depends_on:
      exa-db:
        condition: service_healthy
    ports:
      # Service port: admin UI and REST API
      - "8080:8080"
      # Debug port
      - "8000:8000"
    environment:
      DATABASE_URL: "postgres://examind:examind@exa-db:5432/examind"
      CSTL_HOME: /var/examind/
      CSTL_URL: "http://localhost:8080/examind"
      # org.apache.tomcat.util.buf.UDecoder.ALLOW_ENCODED_SLASH allow to send value in path with encoded slash
      # this is needed when some identifiers contains slash, like in STA for example
      CATALINA_OPTS: >-
        -Xms1G -Xmx4G
        -Dfile.encoding=UTF-8
        -Dorg.apache.tomcat.util.buf.UDecoder.ALLOW_ENCODED_SLASH=tru
        -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:8000
      # User authentication configuration
      CSTL_TOKEN_LIFE: 30
      CSTL_SECRET: examind-secret
      SPRING_PROFILES_ACTIVE: standard,fsconfig
      # TODO: document these parameters
      EXAMIND_ENABLE_INTERNAL_SIS_STORE: "true"
      EXA_CACHE_DATA_INFO: "false"
      AWS_REGION: "eu-west-1"
      EXAMIND_API_READONLY: "true"
      # For OpenEO
      EXAMIND_ENABLE_BASIC_AUTH: "true"
      EXAMIND_ENABLE_PARAM_TOKEN: "true"
      # Example for external STAC, and custom process to import data from this stac
      # EXA_OPENEO_EXTERNAL_STAC_PER_WPS_SERVICE: "[openeo,https://stac-pg-api.ifremer.fr]"
      # EXA_OPENEO_EXTERNAL_STAC_CUSTOM_PROCESS_PER_WPS_SERVICE: "[openeo,STACDownloader]"
    
  openeo-web-editor:
    image: mundialis/openeo-web-editor:latest
    container_name: openo-web-editor
    ports:
      - "8096:80"
    restart: unless-stopped

volumes:
  exa-db-volume:
